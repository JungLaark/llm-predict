services:                                         # 컨테이너 정의 시작
  ollama:                                         # 첫번째 컨테이너 이름
    image: ollama/ollama:latest                   # Docker Hub에서 공식 이미지 사용
    container_name: atms-ollama                   # 컨테이너 식별 이름 지정
    restart: unless-stopped                       # 서버 리부팅 시 자동 시작(수동 중지 제외)
    ports:                                        # 호스트 11434 -> 컨테이너 11434 연결
      - "11434:11434"
    volumes:                                      # 모델 파일을 볼륨에 저장(컨테이너 삭제해도 유지)
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1                     # 동시 요청 1개로 제한 → CPU 폭주 방지
      - OLLAMA_MAX_LOADED_MODELS=1                # 모델 1개만 메모리에 유지
      - OLLAMA_KEEP_ALIVE=5m                      # 5분 미사용 시 모델 언로드 → 유휴 시 RAM 반환
    deploy:           
      resources:
        limits:
          cpus: '12'                              # CPU 12코어만 가능
          memory: 10G                             # RAM 10GB까지만 사용 가능
        reservations:
          memory: 2G                              # 최소 2GB는 보장

  prediction-api:                                 # 두번째 컨테이너
    build:
      context: ./python-app                       # python-app 폴더의 Dockerfile로 빌드
    container_name: atms-prediction
    restart: unless-stopped
    ports:
      - "8500:8500"
    depends_on:
      - ollama                                    # Ollama가 먼저 시작된 후 실행
    environment:
      - OLLAMA_HOST=http://ollama:11434           # 같은 네트워크에서 이름으로 통신
      - DB_HOST=${DB_HOST:-192.168.28.22}         # .env 파일 읽음
      - DB_PORT=${DB_PORT:-1432}
      - DB_NAME=${DB_NAME:-datm}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '4'                               # CPU 4코어 제한
          memory: 2G                              # RAM 2GB 제한

volumes:
  ollama_data:                                    # 모델 저장용 영속 볼륨 선언
